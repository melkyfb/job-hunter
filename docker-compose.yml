services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      # Inside Docker, 'localhost' resolves to the container itself, not the host.
      # host.docker.internal always points to the host machine where Ollama/LM Studio runs.
      # This override is ignored when LLM_PROVIDER=openai.
      LOCAL_BASE_URL: http://host.docker.internal:3001/v1
    extra_hosts:
      # Needed on Linux — Docker Desktop (Mac/Windows) provides this automatically.
      - "host.docker.internal:host-gateway"
    volumes:
      - job_hunter_data:/root/.job_hunter
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE: ""   # empty = same-origin proxy via nginx
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  job_hunter_data:
